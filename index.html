<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>妈妈，母亲节快乐 ❤️</title>
  <style>
    body {
      margin: 0;
      background: linear-gradient(to bottom, #ffd6e0, #fff);
      font-family: "Helvetica", sans-serif;
      text-align: center;
      overflow: hidden;
    }

    h1 {
      margin-top: 80px;
      font-size: 36px;
      animation: fadeIn 2s ease;
    }

    p {
      font-size: 18px;
      margin: 20px;
      opacity: 0;
      animation: fadeIn 2s ease forwards;
    }

    p:nth-child(2) { animation-delay: 2s; }
    p:nth-child(3) { animation-delay: 4s; }
    p:nth-child(4) { animation-delay: 6s; }

    button {
      margin-top: 30px;
      padding: 10px 20px;
      border: none;
      background: #ff6f91;
      color: white;
      font-size: 16px;
      border-radius: 20px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px);}
      to { opacity: 1; transform: translateY(0);}
    }
  </style>
</head>

<body>

<h1>妈妈 ❤️</h1>

<p>母亲节快乐！</p>
<p>谢谢你一直以来的照顾和支持</p>
<p>我会努力成为让你骄傲的人</p>

<button onclick="playMusic()">点我播放音乐 🎵</button>

<audio id="bgm" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
  function playMusic() {
    document.getElementById('bgm').play();
  }
</script>

</body>
</html>
