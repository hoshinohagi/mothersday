<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>给亲爱的老妈 ❤️</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: "Microsoft YaHei", sans-serif;
            overflow: hidden; 
            background: #ffd1ff; /* 初始背景色 */
            transition: background 1.5s ease;
        }

        /* 封面样式 */
        #cover {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 1s ease, visibility 1s;
        }

        #cover h1 {
            color: white;
            font-size: 28px;
            margin-bottom: 40px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .start-btn {
            padding: 15px 30px;
            font-size: 18px;
            background: white;
            color: #ff6f91;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            font-weight: bold;
            transition: transform 0.3s ease;
        }

        .start-btn:active { transform: scale(0.9); }

        /* 内容页面样式 */
        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 30px;
            box-sizing: border-box;
            color: white;
            opacity: 0;
            visibility: hidden;
            transition: opacity 1.2s ease, visibility 1.2s;
            z-index: 1;
        }

        .page.active {
            opacity: 1;
            visibility: visible;
            z-index: 2;
        }

        .page img {
            width: 85%;
            max-width: 320px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            transform: scale(0.9);
            transition: transform 1.5s ease;
        }

        .page.active img { transform: scale(1); }

        .page p {
            font-size: 22px;
            font-weight: bold;
            line-height: 1.6;
        }

        /* 飘落物 */
        .heart {
            position: fixed;
            top: -10vh;
            font-size: 20px;
            animation: fall linear forwards;
            pointer-events: none;
            z-index: 10;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        .arrow-up {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            color: white;
            animation: bounce 2s infinite;
            z-index: 10;
            display: none; /* 初始隐藏 */
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateX(-50%) translateY(0);}
            40% {transform: translateX(-50%) translateY(-10px);}
        }
    </style>
</head>

<body>

<audio id="bgm" loop>
    <source src="garden.mp3" type="audio/mpeg">
</audio>

<div id="cover">
    <h1>To: 亲爱的老妈 ❤️</h1>
    <button class="start-btn" onclick="startSurprise()">点击查看米米的信 ✉️</button>
</div>

<div class="page" data-bg="linear-gradient(135deg, #fbc2eb, #a6c1ee)">
    <img src="1.jpg">
    <p>妈妈，谢谢你一直陪着我长大 ❤️</p>
</div>

<div class="page" data-bg="linear-gradient(135deg, #ff9a9e, #fad0c4)">
    <img src="2.jpg">
    <p>你是世界上最好的老妈 🌸</p>
</div>

<div class="page" data-bg="linear-gradient(135deg, #a1c4fd, #c2e9fb)">
    <img src="3.jpg">
    <p>我会努力成为让你骄傲的人 ✨</p>
</div>

<div class="page" data-bg="linear-gradient(135deg, #fccb90, #d57eeb)">
    <img src="4.jpg">
    <p>以后我带你去看很多很多风景 🌍</p>
</div>

<div class="page" data-bg="linear-gradient(135deg, #84fab0, #8fd3f4)">
    <img src="5.jpg">
    <p>你要天天开心，保持身体健康 🍀</p>
</div>

<div class="page" data-bg="linear-gradient(135deg, #fa709a, #fee140)">
    <img src="6.jpg">
    <p>爱你老妈，明天见 ❤️</p>
</div>

<div class="arrow-up" id="scrollHint">︿</div>

<script>
    let currentIndex = 0;
    const pages = document.querySelectorAll('.page');
    const bgm = document.getElementById('bgm');
    const hint = document.getElementById('scrollHint');
    const cover = document.getElementById('cover');
    let isMoving = false;
    let surpriseStarted = false;

    // 点击按钮后的启动函数
    function startSurprise() {
        // 1. 消失封面
        cover.style.opacity = '0';
        setTimeout(() => cover.style.display = 'none', 1000);
        
        // 2. 播放音乐
        bgm.play();
        
        // 3. 显示第一页
        surpriseStarted = true;
        pages[0].classList.add('active');
        document.body.style.background = pages[0].getAttribute('data-bg');
        hint.style.display = 'block';

        // 4. 开始飘落爱心
        setInterval(createHeart, 450);
    }

    // 核心切换逻辑
    function showPage(index) {
        if (!surpriseStarted || isMoving || index < 0 || index >= pages.length) return;
        
        isMoving = true;
        pages[currentIndex].classList.remove('active');
        currentIndex = index;
        pages[currentIndex].classList.add('active');
        document.body.style.background = pages[currentIndex].getAttribute('data-bg');

        // 到达最后一张隐藏箭头
        if (currentIndex === pages.length - 1) {
            hint.style.opacity = "0";
            setTimeout(() => hint.style.display = "none", 500);
        } else {
            hint.style.display = "block";
            hint.style.opacity = "0.8";
        }

        setTimeout(() => { isMoving = false; }, 1300);
    }

    // 滑动/轮滚事件
    window.addEventListener('wheel', (e) => {
        if (e.deltaY > 0) showPage(currentIndex + 1);
        else showPage(currentIndex - 1);
    });

    let touchStartY = 0;
    window.addEventListener('touchstart', (e) => {
        touchStartY = e.touches[0].clientY;
    });

    window.addEventListener('touchend', (e) => {
        let touchEndY = e.changedTouches[0].clientY;
        let diff = touchStartY - touchEndY;
        if (Math.abs(diff) > 50) {
            if (diff > 0) showPage(currentIndex + 1);
            else showPage(currentIndex - 1);
        }
    });

    function createHeart() {
        const heart = document.createElement('div');
        heart.classList.add('heart');
        heart.innerHTML = ['❤️','🌸','💖','✨'][Math.floor(Math.random()*4)];
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 5000);
    }
</script>

</body>
</html>
